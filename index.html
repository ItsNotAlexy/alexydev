<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ItsNotAlexy_Kyu</title>
  <meta name="description" content="A website portfolio made by alexy!">
  <meta name="author" content="ItsNotAlexy_Kyu" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
 <!-- PARTICLES -->
 <div id="particles-js"></div>

 <!-- SCRIPTS -->
 <script src="particles.js"></script>
 <script src="js/app.js"></script>

<body>
  <!-- WELCOME PAGE-->
  <div class="title">
    <h1> Im 
      <a href="" class="typewrite" data-period="2000" data-type='[ "Alexy.", "A Developer.", "A Python Lover.", "A Very Chill Guy." ]'>
        <span class="wrap"></span>
      </a>
      <style>
        * { color:#fff; text-decoration: none;}
      </style>
      <script>
        var TxtType = function(el, toRotate, period) {
        this.toRotate = toRotate;
        this.el = el;
        this.loopNum = 0;
        this.period = parseInt(period, 10) || 2000;
        this.txt = '';
        this.tick();
        this.isDeleting = false;
    };

    TxtType.prototype.tick = function() {
        var i = this.loopNum % this.toRotate.length;
        var fullTxt = this.toRotate[i];

        if (this.isDeleting) {
        this.txt = fullTxt.substring(0, this.txt.length - 1);
        } else {
        this.txt = fullTxt.substring(0, this.txt.length + 1);
        }

        this.el.innerHTML = '<span class="wrap">'+this.txt+'</span>';

        var that = this;
        var delta = 200 - Math.random() * 100;

        if (this.isDeleting) { delta /= 2; }

        if (!this.isDeleting && this.txt === fullTxt) {
        delta = this.period;
        this.isDeleting = true;
        } else if (this.isDeleting && this.txt === '') {
        this.isDeleting = false;
        this.loopNum++;
        delta = 500;
        }

        setTimeout(function() {
        that.tick();
        }, delta);
    };

    window.onload = function() {
        var elements = document.getElementsByClassName('typewrite');
        for (var i=0; i<elements.length; i++) {
            var toRotate = elements[i].getAttribute('data-type');
            var period = elements[i].getAttribute('data-period');
            if (toRotate) {
              new TxtType(elements[i], JSON.parse(toRotate), period);
            }
        }
        // INJECT CSS
        var css = document.createElement("style");
        css.type = "text/css";
        css.innerHTML = ".typewrite > .wrap { border-right: 0.08em solid #fff}";
        document.body.appendChild(css);
    };
      </script>
    </h1>
    <p> Frontend Developer And UI/UX Designer</p>  
  </div>
  <!-- FONTS -->
  <link href="https://fonts.googleapis.com/css?family=Roboto:100" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
</body>
</html>
